<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Agung: Sang Ayam & Sang Petani</title>
    <style>
        /* CSS RESET & DASAR */
        :root {
            --gold: #d4af37;
            --cream: #fffdf5;
            --pink-heart: #f4b0c2;
            --dark-text: #5a4a3a;
            --serif-font: 'Georgia', serif;
            --cursive-font: 'Cursive', sans-serif; /* Ganti dengan font estetik dari Google Fonts */
        }

        body, h1, h2, p, ul {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--serif-font);
            background-color: var(--cream);
            color: var(--dark-text);
            line-height: 1.6;
            text-align: center;
        }

        /* CONTAINER UTAMA */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0H100V100H0Z" fill="none" stroke="%23f1e4d0" stroke-width="0.5"/></svg>'); /* Tekstur background halus */
            border: 10px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }

        /* HEADER & CROWN */
        .crown-icon {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        /* JUDUL UTAMA */
        h1.title {
            font-size: 2.5rem;
            color: var(--dark-text);
            margin-bottom: 30px;
        }

        /* KARAKTER PORTRAIT CONTAINER */
        .couple-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .portrait {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid var(--gold);
            overflow: hidden;
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .portrait img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* HATI TENGAH */
        .central-heart {
            width: 120px;
            height: 120px;
            background-color: var(--pink-heart);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid white;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* DETAIL PERAYAAN */
        .details-section h2 {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .details-section .names {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--dark-text);
            margin-bottom: 20px;
        }

        .event-info p {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .event-info span {
            font-weight: bold;
            color: var(--gold);
        }

        /* TOMBOL RSVP & LOKASI */
        .action-buttons {
            margin-top: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background-color: var(--gold);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #bfa030;
        }

        /* PENUTUP */
        .closing-text {
            font-style: italic;
            margin-top: 40px;
            font-size: 1rem;
            color: #8a7a6a;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .couple-container {
                flex-direction: column;
            }
            .central-heart {
                position: relative;
                margin: 20px auto;
                left: auto;
                transform: none;
            }
            h1.title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="crown-icon">👑</div>
        
        <h1 class="title">Undangan Pernikahan Agung</h1>

        <div class="couple-container">
            <div class="portrait ayam">
                <img src="path_to_ayam_image.png" alt="Sang Ayam">
            </div>
            
            <div class="central-heart">
                PERNIKAHAN<br>AGUNG
            </div>
            
            <div class="portrait petani">
                <img src="path_to_petani_image.png" alt="Sang Petani">
            </div>
        </div>

        <div class="details-section">
            <h2>Perayaan Cinta</h2>
            <p class="names">Sang Ayam & Sang Petani</p>
            
            <div class="event-info">
                <p>Hari & Tanggal: <span>Sabtu, 31 Mei 2026</span></p>
                <p>Lokasi: <span>Desa Harmoni</span></p>
                <p>Waktu: <span>10:00 WIB - Selesai</span></p>
            </div>
        </div>

        <div class="action-buttons">
            <a href="https://maps.google.com/?q=Desa+Harmoni" class="btn" target="_blank">Buka Lokasi Map</a>
            <a href="https://forms.gle/RSVP_Form_Link" class="btn">Konfirmasi Kehadiran (RSVP)</a>
        </div>

        <p class="closing-text">Dengan sukacita, kami mengundang Anda untuk merayakan persatuan mereka.</p>
    </div>

</body>
</html>
